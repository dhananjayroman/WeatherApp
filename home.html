<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" integrity="sha512-PgQMlq+nqFLV4ylk1gwUOgm6CtIIXkKwaIHp/PAIWHzig/lKZSEGKEysh0TCVbHJXCLN7WetD8TFecIky75ZfQ==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <title>Weather App</title>
</head>
<style>
    body {
        background-color: aliceblue;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-wrap: wrap;
        height: 100vh;
        width: 100vw;
    }

    .box{
        width: 20vw;
        height: 60vh;
        border-radius: 0.5rem;
        box-shadow: 0 0.2rem 3rem black;
        background: #a5bbdd;
        position: relative;
        overflow: hidden;
        transform: translate3d(0,0,0);
        min-width: 20rem;
        min-height: 35rem;

    }

    
.box::after{
    content: "";
    display: block;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    z-index: 11;
    transform: translate3d(0,0,0,);
}



.info{
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 45%;
    z-index: 4;
}

.location{
    margin-top: 1.5rem;
    text-align: center;
    font-weight: 800;
    font-size: 3rem;
    font-weight: 600;
}

.fas fa-street-view{
    animation: rotate 3s linear infinite alternate;
}

@keyframes rotates {

    from{
        transform: translateX(-0.5rem);
    }
    to{
        transform: translateX(0.5rem);
    }
}

#date{
    text-align: center;
    margin-top: 0.5rem;
    color: #57606f;
    font-size: 1.2rem;
    font-weight: 300;
    text-transform: uppercase;
    
}

.temperature{
    margin-top: 2.5rem;
    text-align: center;
    font-size: 3rem;
}

.temp_minmax{
    text-align: center;
    max-width: 0.3rem;
    font-weight: 300;
    font-size: 1.2rem;
    color: #57606f;
    }

.weathercondition{
    height: 40%;
    display:flex;
    justify-content: center;
    align-items: center;
    font-size: 3em;
    
}

#weathercondition .fas{
    font-size: 6rem;
    animation: fas-anime 3s linear infinite alternate;
}


@keyframes fas-anime {
    from{
        transform: scale(1.1);
    }
    to{
        transform: scale(1.5);
    }
}
</style>
<body>
    <div class="box">
        <div class="wave-one"></div>
        <div class="wave-two"></div>
        <div class="wave-three"></div>

        <center><div id="weathercondition">
            <i class="fas fa-sun" style=color:darkkhaki></i> 
        </div>

        <div class="info">
            <h2 class="location"><i class="fas fa-street-view"></i>{%loc%}, {%country%}</h2>
            <p id="date">WED|Jun|9:40PM</p>
            <h1 class="temperature">{%tempval%}&deg;C</h1>

            <h3 class="temp_minmax">Min 22.35C | Max 32.34C </h3>
        </div>
    </div>



<script>
    const curDate = document.getElementById("date");
let weathercon = document.getElementById("weathercondition");

const tempstatus="{%tempStatus%}";

//condition to check sunny or cloudy
/*if(tempstatus == "Sunny"){
    weathercon.innerHTML = <i class="fas fa-sun;" style='color:#eccc68;'></i>;
}
else if(tempstatus == "Cloudy"){
    weathercon.innerHTML = <i class="fas fa-cloud;" style='color:#f1f2f6;'></i>;
}
else if(tempstatus == "Rainy"){
    weathercon.innerHTML = <i class="fas fa-cloud-rain;" style='color:#a4b0be;'></i>;
} 
else {
    weathercon.innerHTML = <i class="fas fa-cloud-rain;" style='color:#eccc68;'></i>;
}*/

const getCurrentDay = () => {
    var weekday=new Array(7);

    weekday[0] = "Sun";
    weekday[1] = "Mon";
    weekday[2] = "Tue";
    weekday[3] = "Wed";
    weekday[4] = "Thur";
    weekday[5] = "Fri";
    weekday[6] = "Sat";
   
    let currentTime = new Date();
    let day=weekday[currentTime.getDay()];
    return day;
}

const getCurrentTime = () => {
    var months = [
        "Jan",
        "Feb",
        "Mar",
        "Apr",
        "May",
        "June",
        "July",
        "Aug",
        "Sept",
        "Oct",
        "Nov",
        "Dec",
];


    var now=new Date()

    var month=months[now.getMonth()];
    var date=now.getDate();

    let hours = now.getHours();
    let mins = now.getMinutes();

    let period="AM"

    if(hours > 11){
        period = "PM";
        if(hours > 12) hours -= 12;
        }
        if(mins < 10){
            mins = "0"+ mins;
        }
        return `${month} ${date} | ${hours}:${mins}${period}`;
       // console.log(month + "/" +day)
    };
    curDate.innerHTML = getCurrentDay()+ " | "+ getCurrentTime();

  // console.log(month + "/" +day)
    

//getCurrentTime()
//getCurrentDay()
</script>

</body>
</html>
